version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taskflow_db
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=${DB_NAME:-taskflow}
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskflow_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: always
    depends_on:
      - mongodb
    env_file: ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=${DB_NAME:-taskflow}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - taskflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - taskflow_network

networks:
  taskflow_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
